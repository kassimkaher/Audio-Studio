name: VoiceStudio
options:
  bundleIdPrefix: com.voicestudio
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "46WJZZYGW4"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  VoiceStudio:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: VoiceStudio
        excludes:
          - "Views/Mac"
          - "Resources/VoiceStudioMac.entitlements"
          - "Resources/Info-Mac.plist"
    info:
      path: VoiceStudio/Resources/Info.plist
      properties:
        CFBundleDisplayName: Voice Studio
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Voice Studio needs microphone access to record your voice for editing, effects, and montage."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicestudio.app
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

  VoiceStudioMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: VoiceStudio
        excludes:
          - "Views/iOS"
          - "Resources/Info.plist"
          - "Resources/Info-Mac.plist"
          - "Resources/VoiceStudioMac.entitlements"
    info:
      path: VoiceStudio/Resources/Info-Mac.plist
      properties:
        LSApplicationCategoryType: "public.app-category.music"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSMicrophoneUsageDescription: "Voice Studio needs microphone access to record."
        NSLocalNetworkUsageDescription: "Voice Studio uses your local network to link your iPhone as a wireless microphone."
        NSBonjourServices:
          - _voicestudiomic._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicestudio.mac
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VoiceStudio/Resources/VoiceStudioMac.entitlements

  VoiceStudioTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: VoiceStudioTests
    dependencies:
      - target: VoiceStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicestudio.app.tests
        GENERATE_INFOPLIST_FILE: YES

  VoiceStudioUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: VoiceStudioUITests
    dependencies:
      - target: VoiceStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicestudio.app.uitests
        GENERATE_INFOPLIST_FILE: YES

  VoiceStudioMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: VoiceStudioTests
    dependencies:
      - target: VoiceStudioMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicestudio.mac.tests
        GENERATE_INFOPLIST_FILE: YES

  VoiceStudioMic:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: VoiceStudioMic
      - path: VoiceStudio/Audio/Mobile/MobileLinkTransport.swift
    info:
      path: VoiceStudioMic/Info.plist
      properties:
        CFBundleDisplayName: VS Mic
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Voice Studio Mic streams your iPhone microphone to your Mac."
        NSLocalNetworkUsageDescription: "Voice Studio Mic uses the local network to send audio to your Mac."
        NSBonjourServices:
          - _voicestudiomic._tcp
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicestudio.mic
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  VoiceStudio:
    build:
      targets:
        VoiceStudio: all
        VoiceStudioTests: [test]
        VoiceStudioUITests: [test]
    test:
      targets:
        - VoiceStudioTests
        - VoiceStudioUITests

  VoiceStudioMac:
    build:
      targets:
        VoiceStudioMac: all
        VoiceStudioMacTests: [test]
    test:
      targets:
        - VoiceStudioMacTests

  VoiceStudioMic:
    build:
      targets:
        VoiceStudioMic: all
